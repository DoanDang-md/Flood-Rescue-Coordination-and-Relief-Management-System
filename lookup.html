<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tra cứu yêu cầu</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOAST -->
<div id="toast" style="
position: fixed;
top: 20px;
right: 20px;
background: #333;
color: white;
padding: 12px 20px;
border-radius: 10px;
opacity: 0;
transition: 0.3s;
z-index: 999;"></div>

<div class="container mt-5">
  <h2 class="mb-4">🔍 Tra cứu yêu cầu</h2>

  <input id="phone" class="form-control mb-3" placeholder="Nhập số điện thoại">

  <button id="btnSearch" class="mb-3">🔍 Tra cứu</button>

  <!-- Loading -->
  <div id="loading" style="display:none;">🔄 Đang tra cứu...</div>

  <!-- List -->
  <ul id="list" class="list-group mb-3"></ul>

  <!-- Map -->
  <div id="map" style="height:300px;"></div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP =====
let map = L.map('map').setView([10.76,106.66],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

// ===== TOAST =====
function showToast(msg, success = true){
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.background = success ? "#28a745" : "#dc3545";
    toast.style.opacity = 1;

    setTimeout(()=>{
        toast.style.opacity = 0;
    },2000);
}

// ===== SEARCH =====
document.getElementById("btnSearch").addEventListener("click", function(){

    let phone = document.getElementById("phone").value;

    if(!phone){
        showToast("❗ Nhập số điện thoại!", false);
        return;
    }

    document.getElementById("loading").style.display = "block";

    fetch(`http://localhost:3000/requests/${phone}`)
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("list");
        list.innerHTML = "";

        // clear marker cũ
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if(data.length === 0){
            list.innerHTML = "<li class='list-group-item'>Không có dữ liệu</li>";
            showToast("Không tìm thấy!", false);
            return;
        }

        data.forEach(item => {
            list.innerHTML += `
    <li class="list-group-item">
        📍 ${item.content} <br>   // ✅ sửa chỗ này
        📞 ${item.phone}
        📍 ${item.content || "Không có nội dung"}
    </li>
`;
            let marker = L.marker([item.latitude, item.longitude]).addTo(map);
            markers.push(marker);
        });

        // zoom tới marker đầu
        map.setView([data[0].latitude, data[0].longitude], 15);

        showToast("✅ Tra cứu thành công!");
    })
    .catch(() => {
        showToast("❌ Lỗi server!", false);
    })
    .finally(()=>{
        document.getElementById("loading").style.display = "none";
    });

});

</script>

</body>
</html>
