<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Citizen App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<div class="container mt-5">
  <h2 class="mb-4">Gửi yêu cầu hỗ trợ</h2>

  <form id="form">
    <input id="name" class="form-control mb-2" placeholder="Tên">
    <input id="phone" class="form-control mb-2" placeholder="SĐT">
    <textarea id="content" class="form-control mb-2" placeholder="Nội dung"></textarea>

    <div id="map" style="height:300px" class="mb-3"></div>

    <button class="btn btn-primary">Gửi</button>
  </form>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([10.76,106.66],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker, lat, lng;

// Click map để lấy tọa độ
map.on("click", function(e){
  lat = e.latlng.lat;
  lng = e.latlng.lng;

  if(marker) map.removeLayer(marker);

  marker = L.marker([lat,lng]).addTo(map);
});

// Submit form
document.getElementById("form").onsubmit = function(e){
  e.preventDefault();

  if(!lat || !lng){
    alert("Vui lòng chọn vị trí trên bản đồ!");
    return;
  }

  fetch("http://localhost:3000/requests",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      content: document.getElementById("content").value,
      lat: lat,
      lng: lng
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Gửi thành công!");
  })
  .catch(err => {
    alert("Lỗi gửi!");
  });
}
</script>

</body>
</html>
