<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Hệ thống Điều phối Cứu hộ</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <section
      class="h-100 gradient-form"
      style="background-color: #eee; min-height: 100vh"
    >
      <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-xl-10">
            <div class="card rounded-3 text-black shadow-lg">
              <div class="row g-0">
                <div class="col-lg-6">
                  <div class="card-body p-md-5 mx-md-4">
                    <div class="text-center">
                      <img
                        src="https://cdn-icons-png.flaticon.com/512/1004/1004733.png"
                        style="width: 100px; margin-bottom: 20px"
                        alt="logo"
                      />
                      <h4 class="mt-1 mb-5 pb-1">
                        Hệ thống Điều phối & Cứu trợ
                      </h4>
                    </div>

                    <form action="api/login.php" method="POST">
                      <p>Vui lòng đăng nhập bằng tài khoản nội bộ</p>

                      <div data-mdb-input-init class="form-outline mb-4">
                        <input
                          type="text"
                          id="username"
                          name="username"
                          class="form-control"
                        />
                        <label class="form-label" for="username"
                          >Tên đăng nhập</label
                        >
                      </div>

                      <div data-mdb-input-init class="form-outline mb-4">
                        <input
                          type="password"
                          id="password"
                          name="password"
                          class="form-control"
                        />
                        <label class="form-label" for="password"
                          >Mật khẩu</label
                        >
                      </div>

                      <div class="text-center pt-1 mb-5 pb-1">
                        <button
                          class="btn btn-primary btn-block fa-lg gradient-custom-2 mb-3"
                          type="submit"
                        >
                          Đăng nhập hệ thống
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
                <div
                  class="col-lg-6 d-flex align-items-center gradient-custom-2"
                  style="
                    background: linear-gradient(
                      to right,
                      #ee7724,
                      #d8363a,
                      #dd3675,
                      #b44593
                    );
                  "
                >
                  <div class="text-white px-3 py-4 p-md-5 mx-md-4">
                    <h4 class="mb-4">Nhanh chóng - An toàn - Chính xác</h4>
                    <p class="small mb-0">
                      Hệ thống chuyên dụng dành cho Điều phối viên và các Đội
                      cứu hộ thực địa.
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
