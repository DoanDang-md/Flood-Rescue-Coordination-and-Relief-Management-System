<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen App</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOAST -->
<div id="toast" style="
position: fixed;
top: 20px;
right: 20px;
background: #333;
color: white;
padding: 12px 20px;
border-radius: 10px;
opacity: 0;
transition: 0.3s;
z-index: 999;"></div>

<div class="container mt-5">
  <h2 class="mb-4">🚀 Gửi yêu cầu hỗ trợ</h2>

  <input id="name" class="form-control mb-2" placeholder="Tên">
  <input id="phone" class="form-control mb-2" placeholder="SĐT">
  <textarea id="content" class="form-control mb-2" placeholder="Nội dung"></textarea>

  <div id="map" style="height:300px;" class="mb-3"></div>

  <button id="btnSend" class="mt-3">🚀 Gửi yêu cầu</button>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP =====
let map = L.map('map').setView([10.76,106.66],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = null;
let lat = null, lng = null;

map.on("click", function(e){
    lat = e.latlng.lat;
    lng = e.latlng.lng;

    if(marker) map.removeLayer(marker);

    marker = L.marker([lat,lng]).addTo(map);
});

// ===== TOAST =====
function showToast(msg, success = true){
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.background = success ? "#28a745" : "#dc3545";
    toast.style.opacity = 1;

    setTimeout(()=>{
        toast.style.opacity = 0;
    },2000);
}

// ===== CLICK BUTTON =====
document.getElementById("btnSend").addEventListener("click", function(){

    if(!lat || !lng){
        showToast("❗ Chọn vị trí trên bản đồ!", false);
        return;
    }

    let btn = this;
    btn.innerText = "Đang gửi...";
    btn.disabled = true;

    fetch("http://localhost:3000/requests", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    content: document.getElementById("content").value, 
    latitude: lat,
    longitude: lng
})
    })
    .then(res => {
        if(res.ok){
            showToast("✅ Gửi thành công!");

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("content").value = "";

            if(marker) map.removeLayer(marker);
            lat = lng = null;

        } else {
            showToast("❌ Gửi thất bại!", false);
        }
    })
    .catch(() => {
        showToast("❌ Không kết nối server!", false);
    })
    .finally(()=>{
        btn.innerText = "🚀 Gửi yêu cầu";
        btn.disabled = false;
    });

});

</script>

</body>
</html>
